<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Licenças</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      <script>
if (localStorage.getItem('logado') !== 'true') {
  window.location.href = 'login.html';
}
</script>
      font-family: 'Inter', sans-serif;
      background-color: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      border-bottom: 2px solid #6366f1;
      padding-bottom: 12px;
      margin-bottom: 24px;
    }

    img {
      border-radius: 10px;
      max-width: 100%;
      margin-bottom: 20px;
    }

    p {
      color: #94a3b8;
      line-height: 1.7;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registro e Controle de Licenças</h1>
    <img src="imagem.png" alt="Licenças empresariais">
    <p>Sistema de controle de licenças de operação,
    ambientais e permissões da empresa.</p>
  </div>
</body>
</html>
