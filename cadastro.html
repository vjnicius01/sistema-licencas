<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - Sistema de Licenças</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 320px;
    }
    h2 { text-align: center; margin-bottom: 24px; color: #333; }
    label { font-size: 13px; color: #555; }
    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }
    .btn-cadastrar {
      width: 100%;
      padding: 12px;
      background: #4A90E2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-cadastrar:hover { background: #357ABD; }
    .btn-voltar {
      width: 100%;
      padding: 12px;
      background: white;
      color: #4A90E2;
      border: 2px solid #4A90E2;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-voltar:hover { background: #f0f7ff; }
    #msg { text-align: center; margin-top: 12px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Cadastrar Usuário</h2>
    <label>Nome</label>
    <input type="text" id="nome" placeholder="Digite seu nome">
    <label>Login</label>
    <input type="text" id="login" placeholder="Digite seu login">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="Digite sua senha">
    <button class="btn-cadastrar" onclick="cadastrar()">Cadastrar</button>
    <button class="btn-voltar" onclick="window.location.href='login.html'">Voltar ao Login</button>
    <p id="msg"></p>
  </div>
  <script>
    async function cadastrar() {
      const nome = document.getElementById('nome').value;
      const login = document.getElementById('login').value;
      const senha = document.getElementById('senha').value;

      if (!nome || !login || !senha) {
        document.getElementById('msg').style.color = 'red';
        document.getElementById('msg').textContent = 'Preencha todos os campos!';
        return;
      }

      const res = await fetch('/api/cadastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, login, senha })
      });
      const data = await res.json();
      if (data.sucesso) {
        document.getElementById('msg').style.color = 'green';
        document.getElementById('msg').textContent = 'Usuário cadastrado com sucesso!';
        setTimeout(() => window.location.href = 'login.html', 2000);
      } else {
        document.getElementById('msg').style.color = 'red';
        document.getElementById('msg').textContent = data.erro || 'Erro ao cadastrar!';
      }
    }
  </script>
</body>
</html>
