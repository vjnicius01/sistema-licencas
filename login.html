<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema de Licenças</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 320px;
    }
    h2 { text-align: center; margin-bottom: 24px; color: #333; }
    label { font-size: 13px; color: #555; }
    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }
    .btn-entrar {
      width: 100%;
      padding: 12px;
      background: #4A90E2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-entrar:hover { background: #357ABD; }
    .btn-cadastrar {
      width: 100%;
      padding: 12px;
      background: white;
      color: #4A90E2;
      border: 2px solid #4A90E2;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-cadastrar:hover { background: #f0f7ff; }
    #msg { text-align: center; margin-top: 12px; color: red; font-size: 13px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Sistema de Licenças</h2>
    <label>Login</label>
    <input type="text" id="login" placeholder="Digite seu login">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="Digite sua senha">
    <button class="btn-entrar" onclick="entrar()">Entrar</button>
    <button class="btn-cadastrar" onclick="window.location.href='cadastro.html'">Cadastrar Usuário</button>
    <p id="msg"></p>
  </div>
  <script>
  async function entrar() {
  const login = document.getElementById('login').value;
  const senha = document.getElementById('senha').value;
    
  if (login === 'admin' && senha === '123456') {
    localStorage.setItem('logado', 'true');
    window.location.href = 'index.html';
    return;
  }
  const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
  const usuario = usuarios.find(u => u.login === login && u.senha === senha);

  if (usuario) {
    localStorage.setItem('logado', 'true');
    window.location.href = 'index.html';
  } else {
    document.getElementById('msg').textContent = 'Login ou senha incorretos!';
  }
}
    }
  </script>
</body>
</html>
